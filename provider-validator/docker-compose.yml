services:

  redis:
    image: redis:7
    container_name: pv_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pv_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pv_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: celery -A src.celery_app worker --loglevel=info

  gradio:
    build:
      context: .
      dockerfile: Dockerfile.gradio
    container_name: pv_gradio
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - worker
    ports:
      - "7860:7860"
    volumes:
      - .:/app
    command: python src/gradio_app.py

volumes:
  redis_data: